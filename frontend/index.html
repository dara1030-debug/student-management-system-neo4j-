<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

</head>
<body>
    <aside class="sidebar">
    <div class="sidebar-header">
        <h2>Management System</h2>
    </div>
    <ul class="sidebar-nav">
        <li><a href="index.html" class="active">Students</a></li>
        <li><a href="faculty.html">Faculty</a></li>
        <li><a href="course.html">Courses</a></li>
    </ul>
</aside>

    <main class="main-content">
        <div class="container">
            <h1>Student Management System</h1>

            <div class="form-container">
                <h2 id="form-title">Add New Student</h2>
                <form id="student-form">
                    <input type="hidden" id="student-id">
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="student-id-field">Student ID</label>
                            <input type="text" id="student-id-field" name="studentId" required>
                        </div>
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="courses">Enrolled Courses (Hold Ctrl/Cmd to select multiple)</label>
                            <select id="courses" name="courses" multiple>
                                <option value="ITE153">ITE153 - Machine Learning</option>
                                <option value="ITD110">ITD110 - NoSQL</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="submit-btn">Add Student</button>
                            <button type="button" id="cancel-btn" class="hidden">Cancel</button>
                        </div>
                    </div>
                    </form>
            </div>

            <div class="table-container">
                <h2>Student List</h2>
                <table id="students-table">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Courses</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="students-tbody">
                        <tr>
                            <td>2023-1270</td>
                            <td>Darsan Genn Lumindas</td>
                            <td>darsangenn.lumindas@g.msuiit.edu.ph</td>
                            <td>ITD110 - NoSQL</td>
                            <td>
                             <button class="btn-edit" title="Edit"><i class="fas fa-edit"></i></button>
                             <button class="btn-delete" title="Delete"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <p id="no-students" class="hidden">No students found.</p>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
